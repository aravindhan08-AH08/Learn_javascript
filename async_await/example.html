<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Instagram Card</title>
    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
      }

      #post-container {
        height: 500px;
        width: 350px;
        margin-top: 20px;
      }

      .post {
        background: white;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 20px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .post-header {
        display: flex;
        align-items: center;
        padding: 10px;
      }

      .post-header img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        margin-right: 10px;
      }

      .post-image {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .post-content {
        padding: 10px;
      }

      .likes {
        font-weight: bold;
        margin-bottom: 5px;
      }

      .comments,
      .time {
        color: gray;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="post-container"></div>
  </body>
  <script src="./example.js"></script>
</html>
