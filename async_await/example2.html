<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post UI</title>
    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
      }

      #post-container {
        height: 500px;
        width: 350px;
        margin-top: 20px;
      }

      .post {
        background: white;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 20px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .post-header {
        display: flex;
        align-items: center;
        padding: 10px;
      }

      .post-header img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        margin-right: 10px;
      }

      .post-image {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .post-content {
        padding: 10px;
      }

      .likes {
        font-weight: bold;
        margin-bottom: 5px;
      }

      .comments,
      .time {
        color: gray;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="post-container"></div>
  </body>
  <script>
    const posts = [
      {
        id: 1,
        username: "codeacademy_official",
        profilePic:
          "https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png",
        image:
          "https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png",
        likes: 1245,
        comments: 89,
        description:
          "Build Product Cards using Fetch API 🔥 #javascript #webdev",
        timestamp: "2 hours ago",
      },
      {
        id: 2,
        username: "frontend_master",
        profilePic:
          "https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png",
        image:
          "https://developers.elementor.com/docs/assets/img/elementor-placeholder-image.png",
        likes: 980,
        comments: 45,
        description: "Understanding async/await made simple 🚀",
        timestamp: "5 hours ago",
      },
    ];

    const container = document.getElementById("post-container");

        posts.forEach(post => {

            const postDiv = document.createElement("div");
            postDiv.classList.add("post");

            postDiv.innerHTML = `
                <div class="post-header">
                    <img src="${post.profilePic}" width="35">
                    <strong>${post.username}</strong>
                </div>
                
                <img class="post-image" src="${post.image}">
                
                <div class="post-content">
                    <div class="likes">${post.likes} likes</div>
                    <div>${post.description}</div>
                    <div>${post.comments} comments</div>
                    <div>${post.timestamp}</div>
                </div>
                `;

                container.appendChild(postDiv);
        });
  </script>
</html>
