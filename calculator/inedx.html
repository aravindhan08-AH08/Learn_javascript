<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        text-align: center;
        align-items: center;
      }

      h2 {
        margin-bottom: 15px;
      }

      .container {
        background: none;
        box-shadow: none;
        padding: 0;
        width: auto;
      }

      .container {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      input,
      select {
        padding: 6px;
        font-size: 14px;
      }

      button {
        padding: 6px 12px;
        font-size: 14px;
        cursor: pointer;
      }

      #result {
        width: 100%;
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Simple Calculator</h2>

    <input type="number" id="num1" placeholder="Enter First Number" />
    <br /><br />

    <input type="number" id="num2" placeholder="Enter Second Number" />
    <br /><br />

    <select id="operator">
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
    </select>
    <br /><br />

    <button id="calculate">Calculate</button>

    <h3 id="result">Result:</h3>

    <script type="module" src="app.js"></script>
  </body>
</html>
